<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArkNet Share Admin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    h1 {
      font-size: 24px;
      white-space: nowrap;
    }

    .logout-btn {
      padding: 8px 16px;
      background: rgba(255, 107, 107, 0.2);
      border: 1px solid rgba(255, 107, 107, 0.5);
      color: #ff6b6b;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .logout-btn:hover {
      background: rgba(255, 107, 107, 0.3);
    }

    .login-container {
      max-width: 400px;
      margin: 50px auto;
      background: rgba(30, 30, 50, 0.9);
      border-radius: 10px;
      padding: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 14px;
    }

    input[type="password"],
    input[type="text"],
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    input[type="password"]:focus,
    input[type="text"]:focus,
    select:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.1);
    }

    select option {
      background: #1a1a2e;
      color: #fff;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(255, 107, 107, 0.3);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .admin-content {
      display: none;
    }

    .admin-content.show {
      display: block;
    }

    .section {
      background: rgba(30, 30, 50, 0.9);
      border-radius: 10px;
      padding: 30px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .section h2 {
      font-size: 20px;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .code-creation {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 10px;
      margin-bottom: 20px;
    }

    .code-creation select,
    .code-creation input,
    .code-creation button {
      margin: 0;
    }

    @media (max-width: 768px) {
      .code-creation {
        grid-template-columns: 1fr;
      }
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 14px;
    }

    thead {
      background: rgba(255, 255, 255, 0.05);
    }

    th {
      padding: 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    th:nth-child(1) { width: 90px; }  /* Code */
    th:nth-child(2) { width: 220px; } /* Movie */
    th:nth-child(3) { width: 70px; }  /* Status */
    th:nth-child(4) { width: auto; }  /* Ready - flexible width */
    th:nth-child(5) { width: 120px; } /* Created */
    th:nth-child(6) { width: 120px; } /* Action */

    td {
      padding: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .status-unused {
      color: #6bff6b;
      font-weight: 600;
    }

    .status-used {
      color: #aaa;
    }

    .status-banned {
      color: #ff6b6b;
      font-weight: 600;
    }

    .status-ready {
      color: #6bff6b;
      font-weight: 600;
    }

    .status-pending {
      color: #ffb86b;
      font-weight: 600;
    }

    .status-not-ready {
      color: #aaa;
    }

    .progress-container {
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 100%;
    }

    .progress-bar {
      width: 100%;
      height: 32px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid rgba(255, 184, 107, 0.3);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffb86b, #ffa500);
      transition: width 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #000;
      font-weight: 600;
    }

    .progress-text {
      font-size: 11px;
      color: #ffb86b;
    }

    .remux-btn {
      padding: 6px 12px;
      background: rgba(107, 200, 255, 0.2);
      border: 1px solid rgba(107, 200, 255, 0.5);
      color: #6bc8ff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s ease;
      width: auto;
      font-weight: 500;
    }

    .remux-btn:hover {
      background: rgba(107, 200, 255, 0.3);
    }

    .remux-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .action-btn {
      padding: 6px 12px;
      background: rgba(255, 107, 107, 0.2);
      border: 1px solid rgba(255, 107, 107, 0.5);
      color: #ff6b6b;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s ease;
      width: auto;
      font-weight: 500;
    }

    .action-btn:hover {
      background: rgba(255, 107, 107, 0.3);
    }

    .copy-btn {
      padding: 6px 12px;
      background: rgba(107, 255, 107, 0.2);
      border: 1px solid rgba(107, 255, 107, 0.5);
      color: #6bff6b;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s ease;
      width: auto;
      font-weight: 500;
      margin-left: 8px;
    }

    .copy-btn:hover {
      background: rgba(107, 255, 107, 0.3);
    }

    .code-display {
      display: inline-block;
      background: rgba(107, 255, 107, 0.1);
      padding: 8px 12px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .message {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .error {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.5);
      color: #ff6b6b;
    }

    .success {
      background: rgba(107, 255, 107, 0.1);
      border: 1px solid rgba(107, 255, 107, 0.5);
      color: #6bff6b;
    }

    .hidden {
      display: none;
    }

    .empty {
      text-align: center;
      padding: 30px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Login Section -->
    <div id="login-section" class="login-container">
      <h2>🔐 Admin Login</h2>
      <div id="login-error" class="message error hidden"></div>
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="password">Password:</label>
          <input type="password" id="password" required autofocus>
        </div>
        <button type="submit">Login</button>
      </form>
    </div>

    <!-- Admin Content -->
    <div id="admin-content" class="admin-content">
      <header>
        <h1>🌐 ArkNet Share Admin</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </header>

      <!-- Create Code Section -->
      <div class="section">
        <h2>Create Code</h2>
        <div id="create-error" class="message error hidden"></div>
        <div id="create-success" class="message success hidden"></div>

        <div class="code-creation">
          <select id="movie-select" required>
            <option value="">Select a movie...</option>
          </select>
          <input type="text" id="custom-code" placeholder="Custom code (optional)" maxlength="8">
          <button onclick="createCode()">Create Code</button>
          <button onclick="refreshMovies()" style="background: rgba(107, 255, 107, 0.2); border: 1px solid rgba(107, 255, 107, 0.5); color: #6bff6b;">Refresh</button>
        </div>
      </div>

      <!-- Codes Section -->
      <div class="section">
        <h2>Codes</h2>
        <div id="codes-container">
          <div class="empty">Loading codes...</div>
        </div>
      </div>

      <!-- IP Bans Section -->
      <div class="section">
        <h2>IP Bans</h2>
        <div id="bans-container">
          <div class="empty">Loading bans...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let adminToken = null;

    // Copy to clipboard
    function copyToClipboard(text, button = null) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          if (button) {
            const oldText = button.textContent;
            button.textContent = 'Copied!';
            setTimeout(() => {
              button.textContent = oldText;
            }, 2000);
          }
        }).catch((err) => {
          console.error('Copy failed:', err);
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    }

    // Fallback for older browsers
    function fallbackCopy(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
      } catch (err) {
        console.error('Fallback copy failed:', err);
      }
      document.body.removeChild(textarea);
    }

    // Check if already logged in (from sessionStorage)
    function checkSession() {
      const token = sessionStorage.getItem('adminToken');
      if (token) {
        adminToken = token;
        showAdminContent();
        refreshData();
      }
    }

    // Handle login
    async function handleLogin(event) {
      event.preventDefault();
      const password = document.getElementById('password').value;
      const loginError = document.getElementById('login-error');

      loginError.classList.add('hidden');

      try {
        const response = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        const data = await response.json();

        if (!response.ok) {
          loginError.textContent = data.error || 'Login failed.';
          loginError.classList.remove('hidden');
          return;
        }

        adminToken = data.token;
        sessionStorage.setItem('adminToken', adminToken);
        // Fetch CSRF token after successful login
        await fetchCsrfToken();
        showAdminContent();
        refreshData();
      } catch (err) {
        console.error('Error:', err);
        loginError.textContent = 'Network error.';
        loginError.classList.remove('hidden');
      }
    }

    // Logout
    function logout() {
      adminToken = null;
      sessionStorage.removeItem('adminToken');
      document.getElementById('login-section').style.display = 'block';
      document.getElementById('admin-content').classList.remove('show');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }

    // Show admin content
    function showAdminContent() {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('admin-content').classList.add('show');
    }

    // CSRF token storage
    let csrfToken = null;

    // Fetch CSRF token on page load
    async function fetchCsrfToken() {
      try {
        const response = await fetch('/admin/api/csrf-token');
        const data = await response.json();
        csrfToken = data.csrfToken;
      } catch (err) {
        console.error('Error fetching CSRF token:', err);
      }
    }

    // API request helper
    async function apiRequest(endpoint, method = 'GET', body = null) {
      const options = {
        method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${adminToken}`
        }
      };

      // Fetch fresh CSRF token for state-changing operations
      if (['POST', 'PUT', 'DELETE'].includes(method)) {
        await fetchCsrfToken();
        if (csrfToken) {
          options.headers['X-CSRF-Token'] = csrfToken;
        }
      }

      if (body) options.body = JSON.stringify(body);

      const response = await fetch(`/admin/api${endpoint}`, options);
      if (response.status === 401) {
        logout();
        throw new Error('Unauthorized');
      }
      if (response.status === 403) {
        console.error('CSRF token invalid');
        throw new Error('CSRF validation failed');
      }
      return response;
    }

    // Refresh movies dropdown
    async function refreshMovies() {
      try {
        const response = await apiRequest('/movies');
        const data = await response.json();
        const select = document.getElementById('movie-select');
        const currentValue = select.value;

        select.innerHTML = '<option value="">Select a movie...</option>';
        data.movies.forEach(movie => {
          const option = document.createElement('option');
          option.value = movie;
          option.textContent = movie;
          select.appendChild(option);
        });

        if (currentValue) select.value = currentValue;
      } catch (err) {
        console.error('Error refreshing movies:', err);
      }
    }

    // Create code
    async function createCode() {
      const moviePath = document.getElementById('movie-select').value;
      const customCode = document.getElementById('custom-code').value || undefined;
      const createError = document.getElementById('create-error');
      const createSuccess = document.getElementById('create-success');

      createError.classList.add('hidden');
      createSuccess.classList.add('hidden');

      if (!moviePath) {
        createError.textContent = 'Please select a movie.';
        createError.classList.remove('hidden');
        return;
      }

      try {
        const response = await apiRequest('/codes', 'POST', {
          moviePath,
          code: customCode
        });

        const data = await response.json();

        if (!response.ok) {
          createError.textContent = data.error || 'Failed to create code.';
          createError.classList.remove('hidden');
          return;
        }

        const codeValue = data.code;
        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = 'Copy';
        copyBtn.onclick = function() {
          copyToClipboard(codeValue, this);
        };

        let successMsg = `✓ Code created: <span class="code-display">${codeValue}</span>`;
        createSuccess.innerHTML = successMsg;
        createSuccess.appendChild(copyBtn);
        createSuccess.classList.remove('hidden');
        document.getElementById('custom-code').value = '';
        setTimeout(() => {
          refreshCodes();
          // Start auto-refresh if remux was started
          if (data.remuxStarted) {
            startAutoRefresh();
          }
        }, 500);
      } catch (err) {
        console.error('Error:', err);
        createError.textContent = 'Network error.';
        createError.classList.remove('hidden');
      }
    }

    // Refresh codes
    async function refreshCodes() {
      try {
        const response = await apiRequest('/codes');
        const data = await response.json();

        // Fetch progress data
        let progressData = {};
        try {
          const progressResponse = await apiRequest('/remux-progress');
          const progressJson = await progressResponse.json();
          progressData = progressJson.progress || {};
        } catch (err) {
          console.warn('Failed to fetch progress data:', err);
        }

        const container = document.getElementById('codes-container');
        if (data.codes.length === 0) {
          container.innerHTML = '<div class="empty">No codes yet.</div>';
          return;
        }

        let html = `
          <table>
            <thead>
              <tr>
                <th>Code</th>
                <th>Movie</th>
                <th>Status</th>
                <th>Ready</th>
                <th>Created</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
        `;

        data.codes.forEach(code => {
          const status = code.used ? 'Used' : 'Unused';
          const statusClass = code.used ? 'status-used' : 'status-unused';
          const created = new Date(code.created_at * 1000).toLocaleString();
          const redeemed = code.redeemed_at ? new Date(code.redeemed_at * 1000).toLocaleString() : '-';

          let readyHtml = '';
          let actionHtml = `<button class="action-btn" onclick="deleteCode(${code.id})">Delete</button>`;

          if (code.isRemuxing) {
            const progress = progressData[code.movie_path] || { percent: 0 };
            const percent = Math.min(progress.percent || 0, 99); // Cap at 99% while remuxing
            readyHtml = `
              <div class="progress-container">
                <div class="progress-bar">
                  <div class="progress-fill" style="width: ${percent}%;">
                    ${percent > 10 ? percent + '%' : ''}
                  </div>
                </div>
              </div>
            `;
          } else if (code.isTranscoded) {
            readyHtml = '<span class="status-ready">✓ Ready</span>';
          } else {
            readyHtml = '<span class="status-not-ready">Not ready</span>';
            actionHtml += ` <button class="remux-btn" onclick="triggerRemux('${code.movie_path}')">Remux</button>`;
          }

          html += `
            <tr>
              <td><strong style="cursor: pointer; padding: 4px 8px; border-radius: 3px; transition: background 0.2s;" onclick="copyToClipboard('${code.code}')" title="Click to copy">${code.code}</strong></td>
              <td>${code.movie_name}</td>
              <td><span class="${statusClass}">${status}</span></td>
              <td>${readyHtml}</td>
              <td>${created}</td>
              <td>${actionHtml}</td>
            </tr>
          `;
        });

        html += `
            </tbody>
          </table>
        `;

        container.innerHTML = html;
      } catch (err) {
        console.error('Error:', err);
      }
    }

    // Delete code
    async function deleteCode(codeId) {
      if (!confirm('Delete this code?')) return;

      try {
        const response = await apiRequest(`/codes/${codeId}`, 'DELETE');
        if (!response.ok) {
          alert('Failed to delete code.');
          return;
        }
        refreshCodes();
      } catch (err) {
        console.error('Error:', err);
        alert('Error deleting code.');
      }
    }

    // Refresh bans
    async function refreshBans() {
      try {
        const response = await apiRequest('/bans');
        const data = await response.json();

        const container = document.getElementById('bans-container');
        if (data.bans.length === 0) {
          container.innerHTML = '<div class="empty">No bans.</div>';
          return;
        }

        let html = `
          <table>
            <thead>
              <tr>
                <th>IP Address</th>
                <th>Failed Attempts</th>
                <th>Banned Until</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
        `;

        data.bans.forEach(ban => {
          const bannedUntil = ban.banned_until ? new Date(ban.banned_until * 1000).toLocaleString() : 'Never';
          const statusClass = ban.isBanned ? 'status-banned' : '';

          html += `
            <tr>
              <td><strong>${ban.ip}</strong></td>
              <td>${ban.failed_attempts}</td>
              <td><span class="${statusClass}">${bannedUntil}</span></td>
              <td>
                <button class="action-btn" onclick="unbanIp('${ban.ip}')">Unban</button>
              </td>
            </tr>
          `;
        });

        html += `
            </tbody>
          </table>
        `;

        container.innerHTML = html;
      } catch (err) {
        console.error('Error:', err);
      }
    }

    // Unban IP
    async function unbanIp(ip) {
      if (!confirm(`Unban ${ip}?`)) return;

      try {
        const response = await apiRequest(`/bans/${encodeURIComponent(ip)}`, 'DELETE');
        if (!response.ok) {
          alert('Failed to unban IP.');
          return;
        }
        refreshBans();
      } catch (err) {
        console.error('Error:', err);
        alert('Error unbanning IP.');
      }
    }

    // Trigger remux
    async function triggerRemux(moviePath) {
      if (!confirm(`Start remuxing: ${moviePath}?\n\nThis may take several minutes.`)) return;

      try {
        const response = await apiRequest('/remux', 'POST', { moviePath });
        const data = await response.json();

        if (response.ok) {
          alert(`Remux started! Status: ${data.message}`);
          setTimeout(() => {
            refreshCodes();
            startAutoRefresh();
          }, 2000);
        } else {
          alert(`Error: ${data.error || 'Unknown error'}`);
        }
      } catch (err) {
        console.error('Error:', err);
        alert('Network error.');
      }
    }

    // Auto-refresh codes when remuxing in progress
    let autoRefreshInterval = null;

    async function startAutoRefresh() {
      if (autoRefreshInterval) return; // Already running

      autoRefreshInterval = setInterval(async () => {
        try {
          const response = await apiRequest('/codes');
          const data = await response.json();

          // Check if any codes are remuxing
          const hasRemuxing = data.codes.some(code => {
            const transcodedRelativePath = code.movie_path.replace(/\.[^/.]+$/, '.mp4').replace(/^.*[\\\/]/, '');
            return false; // Will be set by checking isRemuxing
          });

          // Refresh codes to show current status
          await refreshCodes();

          // Check again after refresh
          const response2 = await apiRequest('/codes');
          const data2 = await response2.json();
          const stillRemuxing = data2.codes.some(code => code.isRemuxing);

          if (!stillRemuxing) {
            // No more remuxing, stop auto-refresh
            clearInterval(autoRefreshInterval);
            autoRefreshInterval = null;
          }
        } catch (err) {
          console.error('Auto-refresh error:', err);
        }
      }, 2000); // Poll every 2 seconds
    }

    // Refresh all data
    async function refreshData() {
      await refreshMovies();
      await refreshCodes();
      await refreshBans();
    }

    // Initialize
    checkSession();
  </script>
</body>
</html>
